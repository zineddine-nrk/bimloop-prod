<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component details — IFC Analyzer</title>
    <link rel="stylesheet" href="/static/assets/design.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Compat badges (utilisés par le JS inline) */
        .badge-in_building   { background: var(--info-50);    color: var(--info-600); }
        .badge-démonté       { background: var(--warning-50); color: #92400e; }
        .badge-transporté    { background: #e0e7ff;           color: #3730a3; }
        .badge-stocké        { background: #f3e8ff;           color: #6b21a8; }
        .badge-réutilisé     { background: var(--success-50); color: var(--success-700); }
        .badge[class*="badge-"]:not(.badge-neutral):not(.badge-primary):not(.badge-success):not(.badge-warning):not(.badge-danger):not(.badge-info) {
            display: inline-block; padding: 3px 12px; border-radius: 999px;
            font-size: 11px; font-weight: 600; letter-spacing: .02em;
        }

        /* Boutons de statut */
        .status-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--t-fast);
            background: var(--bg-surface);
            color: var(--text-base);
            display: inline-flex; align-items: center; gap: 6px;
        }
        .status-btn:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .status-btn.active {
            border-color: var(--primary-600);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .2);
            background: var(--primary-50);
            color: var(--primary-700);
        }

        /* Carte de statut principale */
        .status-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .status-big-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 6px;
        }

        /* Grille détails */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 900px) {
            .detail-grid { grid-template-columns: 1fr; }
        }

        /* Lignes d'info */
        .info-row {
            display: flex; justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 500; color: var(--text-strong); text-align: right; }

        /* Historique */
        .history-row {
            display: flex; gap: 12px; align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .history-row:last-child { border-bottom: none; }
        .history-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-top: 6px; flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, .04);
        }
        .history-time { color: var(--text-faint); white-space: nowrap; font-size: 12px; }

        /* QR */
        .qr-img {
            max-width: 180px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: white;
        }

        /* Loc modal (legacy classes) */
        .loc-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, .55);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 9999;
        }
        .loc-modal-overlay.show { display: flex; }
        .loc-modal {
            background: white;
            border-radius: var(--radius-xl);
            padding: 24px 28px;
            width: 90%; max-width: 460px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 200ms ease-out;
        }
        .loc-modal h3 {
            font-size: 16px; font-weight: 600;
            color: var(--text-strong);
            margin-bottom: 6px;
            display: flex; align-items: center; gap: 8px;
        }
        .loc-modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        .loc-modal input, .loc-modal select {
            width: 100%; border: 1px solid var(--border); border-radius: var(--radius-md);
            padding: 10px 12px; font-size: 14px;
            transition: border var(--t-fast), box-shadow var(--t-fast);
        }
        .loc-modal input:focus, .loc-modal select:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
        }
        .loc-modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
        .btn-cancel  { background: var(--bg-muted); color: var(--text-base); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--radius-md); font-weight: 500; cursor: pointer; font-size: 13px; }
        .btn-cancel:hover { background: var(--slate-200); }
        .btn-confirm { background: var(--primary-600); color: white; border: none; padding: 8px 14px; border-radius: var(--radius-md); font-weight: 500; cursor: pointer; font-size: 13px; }
        .btn-confirm:hover { background: var(--primary-700); }
    </style>
</head>
<body data-auth="public">

<div class="fade-in">

    <a href="/tracker" class="btn btn-ghost btn-sm" style="margin-bottom: 16px;">
        <i data-lucide="arrow-left"></i> Back to tracking
    </a>

    <div id="content">
        <div class="loader-block"><div class="spinner"></div><span>Loading…</span></div>
    </div>

</div>

<!-- Layout -->
<script src="/static/assets/layout.js"></script>
<script>
    AppLayout.mount({
        active: "tracking",
        eyebrow: "Workspace",
        title: "Component details",
    });
</script>

<!-- Logique métier (préservée) -->
<script>
const _pathParts = window.location.pathname.replace(/^\/tracker\//, "").split("/");
let projectId = null;
let componentId = "";
if (_pathParts.length >= 2 && /^\d+$/.test(_pathParts[0])) {
    projectId = Number(_pathParts[0]);
    componentId = decodeURIComponent(_pathParts.slice(1).join("/"));
} else {
    componentId = decodeURIComponent(_pathParts.join("/"));
}
// Certains navigateurs mobiles gardent %24 au lieu de $ dans pathname
if (componentId.includes("%24")) {
    componentId = componentId.replace(/%24/g, "$");
}
console.log("Component ID:", componentId);

const STATUS_COLORS = {
    "in_building":    "#1e40af",
    "démonté":        "#92400e",
    "transporté":     "#3730a3",
    "stocké":         "#6b21a8",
    "à réutiliser":   "#065f46",
    "à recycler":     "#b91c1c",
};
const STATUS_BG = {
    "in_building":    "#dbeafe",
    "démonté":        "#fef3c7",
    "transporté":     "#e0e7ff",
    "stocké":         "#f3e8ff",
    "à réutiliser":   "#d1fae5",
    "à recycler":     "#fee2e2",
};
const STATUS_ICONS = {
    "in_building":    "🏗️",
    "démonté":        "🔨",
    "transporté":     "🚚",
    "stocké":         "📦",
    "à réutiliser":   "♻️",
    "à recycler":     "🔄",
};
const STATUTS = ["in_building", "démonté", "transporté", "stocké", "à réutiliser", "à recycler"];

// Affichage anglais des clés canoniques fr stockées en DB
const STATUS_LABELS_EN = {
    "in_building":  "In building",
    "démonté":      "Dismantled",
    "transporté":   "In transit",
    "stocké":       "Stored",
    "à réutiliser": "To reuse",
    "à recycler":   "To recycle",
};
const CONDITION_LABELS_EN = { "Neuf": "New", "Bon": "Good", "Moyen": "Fair", "Mauvais": "Poor" };
const AGE_LABELS_EN = {
    "Inférieur à 2 ans":  "Under 2 years",
    "Entre 2 et 10 ans":  "2–10 years",
    "Entre 10 et 50 ans": "10–50 years",
    "Supérieur à 50 ans": "Over 50 years",
};
const TYPE_LABELS_EN = { "Mur":"Wall","Mur rideau":"Curtain wall","Porte":"Door","Fenêtre":"Window","Dalle":"Slab","Escalier":"Stairs","Toiture":"Roof","Inconnu":"Unknown" };
function stLbl(s){return STATUS_LABELS_EN[s]||s||"—";}
function cdLbl(c){return CONDITION_LABELS_EN[c]||c||"—";}
function agLbl(a){return AGE_LABELS_EN[a]||a||"—";}
function tyLbl(t){return TYPE_LABELS_EN[t]||t||"—";}

function hasAuth() {
    try { return !!localStorage.getItem("ifc_auth_token"); } catch (_) { return false; }
}

function apiFetch(url, opts = {}) {
    const headers = new Headers(opts.headers);
    if (hasAuth() && !headers.has("Authorization")) {
        headers.set("Authorization", "Bearer " + localStorage.getItem("ifc_auth_token"));
    }
    return fetch(url, { ...opts, headers });
}

async function load() {
    const apiPath = hasAuth()
        ? `/api/tracker/component/${encodeURIComponent(componentId)}`
        : `/api/public/component/${encodeURIComponent(componentId)}`;
    const res = await apiFetch(apiPath);
    if (!res.ok) {
        document.getElementById("content").innerHTML = `
            <div class="alert alert-danger">
                <i data-lucide="alert-circle"></i>
                <div><strong>Component not found</strong>
                <div class="text-sm">The ID <code>${componentId}</code> doesn't exist.</div></div>
            </div>`;
        if (window.lucide) lucide.createIcons();
        return;
    }
    const comp = await res.json();
    render(comp);
}

function render(comp) {
    const history = comp.history || [];
    document.title = `${tyLbl(comp.type) || comp.id} — IFC Analyzer`;

    const isAuth = hasAuth();
    const loginUrl = `/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;

    document.getElementById("content").innerHTML = `

    ${!isAuth ? `
    <div class="alert alert-warning" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:10px;">
                <i data-lucide="eye" style="width:20px;height:20px;flex-shrink:0;"></i>
                <span>
                    <strong>Lecture seule</strong> — Connectez-vous pour modifier le statut ou les informations.
                </span>
            </div>
            <a href="${loginUrl}" class="btn btn-primary" style="white-space:nowrap;">Lecture seule — Connectez-vous pour modifier</a>
        </div>
    </div>
    ` : ""}

    <!-- Carte statut principale -->
    <div class="status-card">
        <div>
            <div class="text-muted text-sm" style="text-transform:uppercase;letter-spacing:.04em;font-weight:600;">
                ${tyLbl(comp.type) || "Component"}
            </div>
            <div style="font-size:18px;font-weight:600;color:var(--text-strong);margin-top:4px;font-family:'SF Mono',Consolas,monospace;">
                ${comp.id}
            </div>
            <div class="status-big-badge" style="background:${STATUS_BG[comp.status]||'#f3f4f6'};color:${STATUS_COLORS[comp.status]||'#374151'};">
                <span>${STATUS_ICONS[comp.status] || "📌"}</span>
                ${stLbl(comp.status)}
            </div>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--text-muted);">
            <div>Last updated</div>
            <strong style="color:var(--text-strong);font-size:14px;">${(comp.updated_at||"—").slice(0,16)}</strong>
        </div>
    </div>

    <div class="detail-grid">
        <!-- Informations -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i data-lucide="info"></i> Information</h3>
            </div>
            <div class="card-body">
                <div class="info-row"><span class="info-label">Type</span><span class="info-value">${tyLbl(comp.type)}</span></div>
                <div class="info-row"><span class="info-label">Material</span><span class="info-value">${comp.material||"—"}</span></div>
                <div class="info-row"><span class="info-label">IFC location</span><span class="info-value">${comp.ifc_location||"—"}</span></div>
                <div class="info-row"><span class="info-label">Condition</span><span class="info-value">${cdLbl(comp.condition)}</span></div>
                <div class="info-row"><span class="info-label">Estimated age</span><span class="info-value">${agLbl(comp.age_estimated)}</span></div>
                <div class="info-row"><span class="info-label">Imported on</span><span class="info-value">${(comp.created_at||"").slice(0,16)}</span></div>
            </div>
        </div>

        <!-- QR Code -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i data-lucide="qr-code"></i> QR Code</h3>
            </div>
            <div class="card-body" style="text-align:center;">
                <p class="text-muted text-sm mb-4">Scan to open this component sheet.</p>
                <img id="qrImage" class="qr-img" alt="QR Code">
                <div style="margin-top:12px;">
                    <a id="qrDownload" href="#" download="qr-${comp.id}.png" class="btn btn-ghost btn-sm">
                        <i data-lucide="download"></i> Download PNG
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Changer le statut -->
    <div class="card mb-4">
        <div class="card-header">
            <h3 class="card-title"><i data-lucide="refresh-cw"></i> Change status</h3>
        </div>
        <div class="card-body">
            <p class="text-muted text-sm mb-4">Click the new status — you'll be asked for a location if needed.</p>
            <div style="display:flex;gap:8px;overflow-x:auto;white-space:nowrap;padding-bottom:4px;">
                ${STATUTS.map(s => `
                    <button class="status-btn ${comp.status===s?'active':''}" onclick="handleStatusClick('${s}')">
                        ${STATUS_ICONS[s]||""} ${stLbl(s)}
                    </button>
                `).join("")}
            </div>
            <p id="statusMsg" class="text-sm" style="margin-top:10px;color:var(--success-600);"></p>
        </div>
    </div>

    <!-- État & informations -->
    <div class="card mb-4">
        <div class="card-header">
            <h3 class="card-title"><i data-lucide="clipboard-list"></i> Condition & component info</h3>
        </div>
        <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-field">
                    <label class="form-label">Condition</label>
                    <select id="metaCondition" class="select">
                        <option value="">— Not set —</option>
                        <option value="Neuf"    ${comp.condition==="Neuf"?"selected":""}>✨ New</option>
                        <option value="Bon"     ${comp.condition==="Bon"?"selected":""}>🟢 Good</option>
                        <option value="Moyen"   ${comp.condition==="Moyen"?"selected":""}>🟡 Fair</option>
                        <option value="Mauvais" ${comp.condition==="Mauvais"?"selected":""}>🔴 Poor</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="form-label">Estimated age</label>
                    <select id="metaAge" class="select">
                        <option value="">— Not set —</option>
                        <option value="Inférieur à 2 ans"    ${comp.age_estimated==="Inférieur à 2 ans"?"selected":""}>Under 2 years</option>
                        <option value="Entre 2 et 10 ans"    ${comp.age_estimated==="Entre 2 et 10 ans"?"selected":""}>2–10 years</option>
                        <option value="Entre 10 et 50 ans"   ${comp.age_estimated==="Entre 10 et 50 ans"?"selected":""}>10–50 years</option>
                        <option value="Supérieur à 50 ans"   ${comp.age_estimated==="Supérieur à 50 ans"?"selected":""}>Over 50 years</option>
                    </select>
                    <p class="form-hint">Leave empty if unknown.</p>
                </div>
            </div>
            <div class="form-field" style="margin-top:16px;">
                <label class="form-label">Comment</label>
                <textarea id="metaComment" class="textarea" rows="3" placeholder="Free notes: defects, specifics, usage context…">${comp.comment ?? ""}</textarea>
            </div>
            <div class="row" style="margin-top:14px;">
                <button class="btn btn-primary" onclick="saveMeta()">
                    <i data-lucide="save"></i> Save info
                </button>
                <span id="metaMsg" class="text-sm"></span>
            </div>
        </div>
    </div>

    <!-- Historique -->
    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i data-lucide="clock"></i> Status history</h3>
            <span class="badge badge-neutral">${history.length}</span>
        </div>
        <div class="card-body">
            ${history.length === 0
                ? '<p class="text-muted text-sm">No history for this component yet.</p>'
                : history.map(h => `
                <div class="history-row">
                    <div class="history-dot" style="background:${STATUS_COLORS[h.new_status]||'#9ca3af'};"></div>
                    <div style="flex:1;">
                        <span class="font-bold text-strong">${stLbl(h.new_status)}</span>
                        ${h.old_status ? `<span class="text-muted"> ← ${stLbl(h.old_status)}</span>` : ""}
                        ${h.note ? `<div class="text-muted text-sm" style="margin-top:2px;">${h.note}</div>` : ""}
                    </div>
                    <div class="history-time">${(h.changed_at||"").slice(0,16)}</div>
                </div>`).join("")
            }
        </div>
    </div>
    `;
    if (window.lucide) lucide.createIcons();
    loadQrImage(comp.id);

    if (!hasAuth()) {
        document.querySelectorAll("#content .card").forEach((card, i) => {
            const title = card.querySelector(".card-title");
            if (title && (title.textContent.includes("Change status") || title.textContent.includes("Condition"))) {
                card.style.display = "none";
            }
        });
    }
}

let qrObjectUrl = null;
async function loadQrImage(componentId) {
    const img = document.getElementById("qrImage");
    const link = document.getElementById("qrDownload");
    if (!img || !link) return;
    try {
        const res = await apiFetch(`/api/tracker/component/${encodeURIComponent(componentId)}/qr`);
        if (!res.ok) {
            throw new Error("QR fetch failed.");
        }
        const blob = await res.blob();
        if (qrObjectUrl) {
            URL.revokeObjectURL(qrObjectUrl);
        }
        qrObjectUrl = URL.createObjectURL(blob);
        img.src = qrObjectUrl;
        link.href = qrObjectUrl;
    } catch (err) {
        img.alt = "QR Code unavailable";
        link.classList.add("hidden");
    }
}

const STATUS_PROMPTS = {
    "transporté":   { title: "Destination",         question: "Where was the component transported to?", placeholder: "e.g. North warehouse, Lyon" },
    "stocké":       { title: "Component storage",   question: "Specify the storage reason and location.", placeholder: "e.g. Paris 13 depot, zone B", withReason: true },
    "à réutiliser": { title: "Reuse location",       question: "Where will the component be reused?",     placeholder: "e.g. Jules Ferry school site" },
    "à recycler":   { title: "Recycling location",   question: "Where will the component be recycled?",   placeholder: "e.g. SUEZ Gennevilliers sorting center" },
};

const STORAGE_REASONS = [
    { value: "en attente de réutilisation",     label: "♻️ Pending reuse" },
    { value: "en attente de recyclage",         label: "🔄 Pending recycling" },
    { value: "en attente d'évacuation (déchet)", label: "🗑️ Pending disposal (waste)" },
    { value: "stockage temporaire",             label: "⏳ Temporary storage (undefined)" },
];

function handleStatusClick(newStatus) {
    const prompt = STATUS_PROMPTS[newStatus];
    if (!prompt) {
        submitStatus(newStatus, null);
        return;
    }
    openLocationModal(newStatus, prompt);
}

function openLocationModal(newStatus, prompt) {
    const existing = document.getElementById("locModal");
    if (existing) existing.remove();

    const reasonHtml = prompt.withReason ? `
        <label class="form-label" style="margin-top:8px;">Storage reason</label>
        <select id="reasonInput" style="margin-bottom:12px;">
            ${STORAGE_REASONS.map(r => `<option value="${r.value}">${r.label}</option>`).join("")}
        </select>
        <label class="form-label">Storage location</label>
    ` : "";

    const modal = document.createElement("div");
    modal.id = "locModal";
    modal.className = "loc-modal-overlay show";
    modal.innerHTML = `
        <div class="loc-modal" onclick="event.stopPropagation()">
            <h3>${STATUS_ICONS[newStatus]||""} ${prompt.title}</h3>
            <p>${prompt.question}</p>
            ${reasonHtml}
            <input type="text" id="locInput" placeholder="${prompt.placeholder}" autocomplete="off">
            <div class="loc-modal-actions">
                <button class="btn-cancel"  onclick="closeLocationModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmLocation('${newStatus}', ${prompt.withReason?'true':'false'})">Confirm</button>
            </div>
        </div>`;
    modal.addEventListener("click", closeLocationModal);
    document.body.appendChild(modal);
    const input = document.getElementById("locInput");
    input.focus();
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter")  confirmLocation(newStatus, !!prompt.withReason);
        if (e.key === "Escape") closeLocationModal();
    });
}

function closeLocationModal() {
    const m = document.getElementById("locModal");
    if (m) m.remove();
}

function confirmLocation(newStatus, withReason) {
    const lieu = document.getElementById("locInput").value.trim();
    if (!lieu) {
        document.getElementById("locInput").style.borderColor = "var(--danger-500)";
        return;
    }
    let note = `Location: ${lieu}`;
    if (withReason) {
        const reason = document.getElementById("reasonInput").value;
        note = `${reason} — Location: ${lieu}`;
    }
    closeLocationModal();
    submitStatus(newStatus, note);
}

async function saveMeta() {
    if (!hasAuth()) {
        const msg = document.getElementById("metaMsg");
        msg.textContent = "Login required to edit.";
        msg.style.color = "var(--warning-600)";
        return;
    }
    const condition = document.getElementById("metaCondition").value || null;
    const age       = document.getElementById("metaAge").value || null;
    const comment   = document.getElementById("metaComment").value;
    const msg = document.getElementById("metaMsg");
    msg.textContent = "Saving…";
    msg.style.color = "var(--text-muted)";

    const res = await apiFetch(`/api/tracker/component/${encodeURIComponent(componentId)}/meta`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ condition, age_estimated: age, comment }),
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        msg.textContent = `❌ ${err.detail || "Save error"}`;
        msg.style.color = "var(--danger-600)";
        return;
    }
    msg.textContent = "✅ Info saved.";
    msg.style.color = "var(--success-600)";
    setTimeout(() => { msg.textContent = ""; }, 2500);
}

async function submitStatus(newStatus, note) {
    if (!hasAuth()) {
        alert("You need to be logged in to update the status.");
        return;
    }
    const res = await apiFetch(`/api/tracker/component/${encodeURIComponent(componentId)}/status`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus, note: note || null }),
    });
    const msg = document.getElementById("statusMsg");
    if (!res.ok) {
        const err = await res.json();
        msg.textContent = `Error: ${err.detail}`;
        msg.style.color = "var(--danger-600)";
        return;
    }
    msg.textContent = `✅ Status updated → ${stLbl(newStatus)}${note ? " (" + note + ")" : ""}`;
    msg.style.color = "var(--success-600)";
    setTimeout(load, 600);
}

load();
</script>
